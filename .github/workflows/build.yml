name: Build and Release BlockTheSpot

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Hook (x64)
        run: msbuild Hook/Hook.vcxproj -p:Configuration=Release -p:Platform=x64

      - name: Build Loader (x64)
        run: msbuild Loader/Loader.vcxproj -p:Configuration=Release -p:Platform=x64

      - name: Build Hook (x86)
        run: msbuild Hook/Hook.vcxproj -p:Configuration=Release -p:Platform=x86

      - name: Build Loader (x86)
        run: msbuild Loader/Loader.vcxproj -p:Configuration=Release -p:Platform=x86

      - name: Upload Build Artifacts (x64)
        uses: actions/upload-artifact@v4
        with:
          name: blockthespot-x64
          path: |
            out/x64/Release/blockthespot.dll
            out/x64/Release/chrome_elf.dll

      - name: Upload Build Artifacts (x86)
        uses: actions/upload-artifact@v4
        with:
          name: blockthespot-x86
          path: |
            out/Win32/Release/blockthespot.dll
            out/Win32/Release/chrome_elf.dll

  release:
    name: Create Github Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts (x64)
        uses: actions/download-artifact@v4
        with:
          name: blockthespot-x64
          path: release-x64

      - name: Download Artifacts (x86)
        uses: actions/download-artifact@v4
        with:
          name: blockthespot-x86
          path: release-x86

      - name: Create Zip Archives
        run: |
          zip -j blockthespot-x64.zip release-x64/* config.ini
          zip -j blockthespot-x86.zip release-x86/* config.ini

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blockthespot-x64.zip
            blockthespot-x86.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
